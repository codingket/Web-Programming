<!DOCTYPE html>
<html>
<head>
<title>Login - NITW Eats</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.brand img {
    width: 80px;
    border-radius: 50%;
}

.brand h1 {
    color: #7c3aed;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 20px;
    background: #7c3aed;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 13px;
}
</style>

</head>

<body>

<div class="container">

<div class="brand">
    <img src="logo.png" alt="NITW Eats Logo">
    <h1>NITW Eats</h1>
</div>

<h2>Login</h2>

<form id="sign-in">
    <p id="login-error" class="error"></p>

    <input type="email" id="signIn-email" placeholder="Email" required>
    <input type="password" id="signIn-password" placeholder="Password" required>

    <button class="btn" type="submit">Login</button>
</form>

<p>
    Don't have an account? 
    <a href="signup.html" style="color:#7c3aed; font-weight:bold;">Sign Up</a>
</p>

</div>

<!-- BACKEND CONNECTION -->
<script type="module" src="login.js"></script>

</body>
</html>
