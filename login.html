<!DOCTYPE html>
<html>
<head>
    <title>Login - NITW Eats</title>
    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* LOGO SECTION */
        .brand {
            margin-bottom: 20px;
        }

        .brand img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .brand h1 {
            margin: 10px 0 0;
            font-size: 24px;
            color: #7c3aed;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        h2 {
            color: #7c3aed;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus {
            border-color: #7c3aed;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 20px;
            background: #7c3aed;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5b21b6;
        }

        .toggle-text {
            margin-top: 15px;
            font-size: 14px;
        }

        .toggle-text span {
            color: #7c3aed;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- BRAND -->
    <div class="brand">
        <img src="logo.png" alt="NITW Eats Logo">
        <h1>NITW Eats</h1>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn">Login</button>

        <div class="toggle-text">
            Don't have an account? 
            <span onclick="toggleForm()">Sign Up</span>
        </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="hidden">
        <h2>Create Account</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn">Sign Up</button>

        <div class="toggle-text">
            Already have an account? 
            <span onclick="toggleForm()">Login</span>
        </div>
    </div>

</div>

<script>
    function toggleForm() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("signupForm").classList.toggle("hidden");
    }
</script>

</body>
</html>
